services:
  - type: web
    name: api-steven-codes
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    domains:
      - api.steven.codes
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REFRESH_TOKEN
        sync: false
